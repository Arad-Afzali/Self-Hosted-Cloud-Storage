<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="./scss/dashboard.css" />
  </head>

  <body>
    <header></header>
    <main>
      <div class="dashboard">
        <div class="container">
          <div class="sections">
            <div class="left-section">
              <div class="container">
                <div class="profile">
                  <div class="container">
                    <div class="picture">
                      <div class="image">
                        <img src="./files/pictures/profile-icon.svg" alt="" />
                      </div>
                    </div>
                    <div class="name">
                      <div class="text">
                        <p><span>User Name</span></p>
                      </div>
                    </div>
                  </div>
                </div>
                <div
                  class="options"
                >
                  <div class="top"></div>
                  <div class="middle" >
                    <p style="border-top-left-radius: 25px; "><a href=""><span id="active"><img src="./files/pictures/home-icon.svg" alt="" >My Drive</span></a></p>
                  </div>
                  <div class="middle">
                    <p ><a href=""><span> <img src="./files/pictures/favorite-icon.svg" alt=""> Favorite</span></a></p>
                  </div>
                  <div class="middle" ><p style="border-bottom-left-radius: 25px;"><a href=""><span> <img src="./files/pictures/trash-icon.svg" alt=""> Trash</span></a></p></div>
                  <div class="bottom"></div>
                </div>
                <div class="actions">
                    <div class="container">
                        <p><a href=""><span>Settings</span></a></p>
                        <p><a href=""><span>Log Out</span></a></p>
                    </div>
                </div>
              </div>
            </div>
            <div class="middle-section"></div>
            <div class="right-section"></div>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
