<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="./scss/dashboard.css" />
  </head>

  <body>
    <header></header>
    <main>
      <div class="dashboard">
        <div class="container">
          <div class="sections">
            <div class="left-section">
              <div class="container">
                <div class="profile">
                  <div class="container">
                    <div class="picture">
                      <div class="image">
                        <img src="./files/pictures/profile-icon.svg" alt="" />
                      </div>
                    </div>
                    <div class="name">
                      <div class="text">
                        <p><span>User Name</span></p>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="options">
                  <div class="top"></div>
                  <div class="middle">
                    <p style="border-top-left-radius: 25px">
                      <a href=""
                        ><span id="active"
                          ><img src="./files/pictures/home-icon.svg" alt="" />My
                          Drive</span
                        ></a
                      >
                    </p>
                  </div>
                  <div class="middle">
                    <p>
                      <a href=""
                        ><span>
                          <img
                            src="./files/pictures/favorite-icon.svg"
                            alt=""
                          />
                          Favorite</span
                        ></a
                      >
                    </p>
                  </div>
                  <div class="middle">
                    <p style="border-bottom-left-radius: 25px">
                      <a href=""
                        ><span>
                          <img src="./files/pictures/trash-icon.svg" alt="" />
                          Trash</span
                        ></a
                      >
                    </p>
                  </div>
                  <div class="bottom"></div>
                </div>
                <div class="actions">
                  <div class="container">
                    <p>
                      <a href=""><span>Settings</span></a>
                    </p>
                    <p>
                      <a href=""><span>Log Out</span></a>
                    </p>
                  </div>
                </div>
              </div>
            </div>
            <div class="middle-section">
              <div class="container">
                <div class="folders">
                  <div class="container">
                    <p><span>Folders</span></p>
                    <div class="island">
                      <div class="container">
                        <div class="logo">
                          <img src="./files/pictures/folder-icon.svg" alt="" />
                        </div>
                        <div class="title">
                          <p><span>Folder 1</span></p>
                        </div>
                        <div class="filenum">
                          <p><span>87 files</span></p>
                        </div>
                      </div>
                    </div>
                    <div class="island">
                      <div class="container">
                        <div class="logo">
                          <img src="./files/pictures/folder-icon.svg" alt="" />
                        </div>
                        <div class="title">
                          <p><span>Folder 2</span></p>
                        </div>
                        <div class="filenum">
                          <p><span>87 files</span></p>
                        </div>
                      </div>
                    </div>
                    <div class="island">
                      <div class="container">
                        <div class="logo">
                          <img src="./files/pictures/folder-icon.svg" alt="" />
                        </div>
                        <div class="title">
                          <p><span>Folder 3</span></p>
                        </div>
                        <div class="filenum">
                          <p><span>87 files</span></p>
                        </div>
                      </div>
                    </div>
                    <div class="island">
                      <div class="container">
                        <div class="logo">
                          <img src="./files/pictures/folder-icon.svg" alt="" />
                        </div>
                        <div class="title">
                          <p><span>Folder 4</span></p>
                        </div>
                        <div class="filenum">
                          <p><span>120 files</span></p>
                        </div>
                      </div>
                    </div>
                    <div class="island">
                      <div class="container">
                        <div class="logo">
                          <img src="./files/pictures/folder-icon.svg" alt="" />
                        </div>
                        <div class="title">
                          <p><span>Folder 5</span></p>
                        </div>
                        <div class="filenum">
                          <p><span>8 files</span></p>
                        </div>
                      </div>
                    </div>
                    <div class="island">
                      <div class="container">
                        <div class="logo">
                          <img src="./files/pictures/folder-icon.svg" alt="" />
                        </div>
                        <div class="title">
                          <p><span>Folder 6</span></p>
                        </div>
                        <div class="filenum">
                          <p><span>34 files</span></p>
                        </div>
                      </div>
                    </div>
                    <div class="island">
                      <div class="container">
                        <div class="empty">
                          <div class="plus">
                            <img src="./files/pictures/plus-icon.svg" alt="" />
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="files">
                    <div class="container">
                        <p><span>Files</span></p>
                        <div class="file-islands">
                            <div class="container">
                                <div class="logo">
                                    <div class="logo-img">
                                        <img src="./files/pictures/picture-icon.svg" alt="">
                                    </div>
                                </div>
                                <div class="file-name">
                                    <span>img-00034</span>
                                </div>
                                <div class="file-type">
                                    <span>jpg</span>
                                </div>
                                <div class="file-size">
                                    <span>5MB</span>
                                </div>
                                <div class="file-options">
                                    <div class="options-img">
                                        <img src="./files/pictures/option-icon.svg" alt="">
                                    </div>
                                </div>

                                
                            </div>
                        </div>
                        <div class="file-islands">
                            <div class="container">
                                <div class="logo">
                                    <div class="logo-img">
                                        <img src="./files/pictures/audio-icon.svg" alt="">
                                    </div>
                                </div>
                                <div class="file-name">
                                    <span>aud-00034</span>
                                </div>
                                <div class="file-type">
                                    <span>mp3</span>
                                </div>
                                <div class="file-size">
                                    <span>9MB</span>
                                </div>
                                <div class="file-options">
                                    <div class="options-img">
                                        <img src="./files/pictures/option-icon.svg" alt="">
                                    </div>
                                </div>

                                
                            </div>
                        </div>
                        <div class="file-islands">
                            <div class="container">
                                <div class="logo">
                                    <div class="logo-img">
                                        <img src="./files/pictures/video-icon.svg" alt="">
                                    </div>
                                </div>
                                <div class="file-name">
                                    <span>vid-78332</span>
                                </div>
                                <div class="file-type">
                                    <span>mkv</span>
                                </div>
                                <div class="file-size">
                                    <span>780MB</span>
                                </div>
                                <div class="file-options">
                                    <div class="options-img">
                                        <img src="./files/pictures/option-icon.svg" alt="">
                                    </div>
                                </div>

                                
                            </div>
                        </div>

                    </div>
                </div>
              </div>
            </div>
            <div class="right-section"></div>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
